services:
  # ===========================================================================
  # Activities Microservice
  # ===========================================================================
  activities-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: order-v2-microservice
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      # Application Environment
      APP_ENV: ${APP_ENV:-dev}
      APP_PORT: ${APP_PORT:-8080}
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - activities-network

# ===========================================================================
# Networks
# ===========================================================================
networks:
  activities-network:
    driver: bridge
