# Build and push Docker image to GitLab Container Registry
docker_build:
  stage: publish
  # Use matching Docker CLI and dind versions to avoid API-version mismatch
  image: docker:24.0
  services:
    - docker:24.0-dind
  variables:
    DOCKER_HOST: tcp://docker:2375/
    DOCKER_TLS_CERTDIR: ""
  needs:
    - job: build
      artifacts: true
  before_script:
    - echo "Logging in to GitLab Container Registry"
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - which git || (apk add --no-cache git || (apt-get update && apt-get install -y git) || true)
  script:
    - docker build -t "$IMAGE_TAG" .
    - docker push "$IMAGE_TAG"
    - |
      if [ "$CI_COMMIT_REF_NAME" = "main" ] || [ "$CI_COMMIT_REF_NAME" = "master" ]; then
        echo "Pushing production latest tag"
        docker tag "$IMAGE_TAG" "$LATEST_TAG"
        docker push "$LATEST_TAG"
      elif [ "$CI_COMMIT_REF_NAME" = "dev" ]; then
        echo "Pushing dev latest-dev tag"
        docker tag "$IMAGE_TAG" "$DEV_LATEST_TAG"
        docker push "$DEV_LATEST_TAG"
      else
        echo "Branch $CI_COMMIT_REF_NAME: no additional tagging"
      fi
  rules:
    # ห้ามรันบน Merge Request ทุกกรณี
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    # รันเฉพาะ push ไป main/dev
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "main"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "dev"'
      when: on_success
    - when: never

trigger_dokploy:
  stage: deploy
  image: curlimages/curl:8.2.1
  needs:
    - job: docker_build
      artifacts: false
  script:
    - |
      echo "Trigger stage: preparing payload and calling Dokploy (auth type=${DOKPLOY_AUTH_TYPE:-none})"
      # select webhook + token based on branch; fallback to generic webhook/token if env-specific not set
      if [ "$CI_COMMIT_REF_NAME" = "dev" ]; then
        WEBHOOK_URL="${DOKPLOY_WEBHOOK_URL_DEV:-}"
        DOKPLOY_TOKEN_CURRENT="${DOKPLOY_TOKEN_DEV:-}"
        echo "Using webhook: ${WEBHOOK_URL:+set} ${WEBHOOK_URL:+(dev)}"
      else
        WEBHOOK_URL="${DOKPLOY_WEBHOOK_URL:-}"
        DOKPLOY_TOKEN_CURRENT="${DOKPLOY_TOKEN:-}"
        echo "Using webhook: ${WEBHOOK_URL:+set} ${WEBHOOK_URL:+(prod)}"
      fi
      if [ -z "$WEBHOOK_URL" ]; then
        echo "Dokploy webhook for branch '$CI_COMMIT_REF_NAME' not set; skipping dokploy trigger"
        exit 0
      fi
      PAYLOAD="{\"image\":\"$IMAGE_TAG\",\"ref\":\"$CI_COMMIT_REF_NAME\",\"registry\":\"$CI_REGISTRY\"}"
      case "${DOKPLOY_AUTH_TYPE:-none}" in
        "x-gitlab-token")
          if [ -n "$DOKPLOY_TOKEN_CURRENT" ]; then
            curl -sS -X POST -H "X-Gitlab-Token: $DOKPLOY_TOKEN_CURRENT" -H "Content-Type: application/json" -d "$PAYLOAD" "$WEBHOOK_URL" || echo "Dokploy trigger failed but continuing..."
          else
            echo "DOKPLOY_TOKEN for this environment not set; attempting unsigned request"
            curl -sS -X POST -H "Content-Type: application/json" -d "$PAYLOAD" "$WEBHOOK_URL" || echo "Dokploy trigger failed but continuing..."
          fi
          ;;
        "basic")
          # For basic auth, you can also set env-specific user/password if needed
          if [ -n "$DOKPLOY_BASIC_USER" ] && [ -n "$DOKPLOY_BASIC_PASSWORD" ]; then
            curl -sS -X POST -u "$DOKPLOY_BASIC_USER:$DOKPLOY_BASIC_PASSWORD" -H "Content-Type: application/json" -d "$PAYLOAD" "$WEBHOOK_URL" || echo "Dokploy trigger failed but continuing..."
          else
            echo "DOKPLOY_BASIC_USER or DOKPLOY_BASIC_PASSWORD not set; skipping Dokploy trigger"
          fi
          ;;
        *)
          curl -sS -X POST -H "Content-Type: application/json" -d "$PAYLOAD" "$WEBHOOK_URL" || echo "Dokploy trigger failed but continuing..."
          ;;
      esac
  rules:
    # ห้ามรันบน Merge Request ทุกกรณี
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    # รันเฉพาะ push ไป main/dev
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "main"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "dev"'
      when: on_success
    - when: never

# ตัวอย่างการตั้งค่า Variables:
# - CI_REGISTRY (โดย GitLab กำหนดให้อัตโนมัติ)
# - CI_REGISTRY_USER (โดย GitLab กำหนดให้อัตโนมัติ)
# - CI_REGISTRY_PASSWORD (โดย GitLab กำหนดให้อัตโนมัติ)
# - เพิ่ม: DOKPLOY_WEBHOOK_URL_DEV, DOKPLOY_TOKEN_DEV (สำหรับ dev) หากต้องการแยก webhook/credentials
# หากต้องการ push เมื่อเป็น branch เฉพาะ ให้ปรับ 'rules'
