# GitLab CI/CD - Build and push Docker image to GitLab Container Registry
# คู่มือการใช้งาน:
# - GitLab จะให้ตัวแปรอัตโนมัติ: CI_REGISTRY, CI_REGISTRY_IMAGE, CI_REGISTRY_USER, CI_REGISTRY_PASSWORD (CI_JOB_TOKEN)
# - สำหรับ Dokploy: ให้ตั้งค่า Project → Settings → CI/CD → Variables:
#     - DOKPLOY_WEBHOOK_URL        (ค่า URL ของ production webhook)
#     - DOKPLOY_TOKEN              (ตั้งเป็น Masked = true และ Protected = true)
#     - DOKPLOY_WEBHOOK_URL_DEV    (ค่า URL ของ dev webhook)
#     - DOKPLOY_TOKEN_DEV          (Masked, ใช้สำหรับ dev หากต้องการ)
#   ทั้งสองตัวแปรควรตั้งค่าเป็น Masked และ DOKPLOY_TOKEN ควรเป็น Protected หากต้องการให้ trigger เฉพาะ branch ที่ป้องกัน
# - หมายเหตุ: job สำหรับ publish (docker_build) ถูกตั้งให้รันเฉพาะ branch main/dev เพื่อ push tag แยกกัน (latest / latest-dev)
#
variables:
  DOCKER_DRIVER: overlay2
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  LATEST_TAG: $CI_REGISTRY_IMAGE:latest
  DEV_LATEST_TAG: $CI_REGISTRY_IMAGE:latest-dev
  # Default Dokploy webhook (override in Project → Settings → CI/CD → Variables if needed)
  # NOTE: set DOKPLOY_TOKEN & DOKPLOY_TOKEN_DEV in GitLab CI/CD variables (masked) for secure usage

stages:
  - build
  - publish
  - deploy

# Build: ติดตั้ง dependencies และ build แอป (เก็บ artifacts)
build:
  stage: build
  image: golang:1.25-alpine
  script:
    - go version
    - go build -o order-v2-microservice ./cmd/main.go
  artifacts:
    paths:
      - order-v2-microservice
    expire_in: 1 hour
  rules:
    # 1) สร้าง build เมื่อเป็น Merge Request (ตรวจสอบว่า build ผ่านก่อน merge)
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: on_success
    # 2) สร้าง build เมื่อเป็น push ไปยัง main หรือ dev (ให้ pipeline เต็มทำงานต่อ: docker_build → trigger_dokploy)
    - if: '$CI_PIPELINE_SOURCE == "push" && ($CI_COMMIT_REF_NAME == "main" || $CI_COMMIT_REF_NAME == "dev")'
      when: on_success
    # ป้องกันไม่ให้ job นี้รันในกรณีอื่น
    - when: never

